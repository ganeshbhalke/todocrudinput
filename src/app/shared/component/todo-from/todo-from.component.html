<div class="card">
    <div class="card-body">
        <h2 class="font-weight-bold">
            {{isInEditMode? 'Update Todo':'Add Todo'}}
        </h2>
        <div class="form-group">
            <label for="todoItem"> TODO ITEM</label>
            <input type="text" #todoItem class="form-control">
        </div>

        <div class="form-group">
            <label for="iscomplated">Is Complated</label>
            <select type="text" #iscomplated class="form-control">
                <option value="true">Yes</option>
                <option value="false">NO</option>
            </select>
        </div>
         <button
         *ngIf="!isInEditMode"
         (click)="onTodoAdd()"
         mat-raised-button  class="w-100" color="primary">Add TODO</button>

         <button
         (click)="onUpdate()"
         *ngIf="isInEditMode"
         mat-raised-button  class="w-100" color="warn">Update TODO</button>
    </div>
</div>
