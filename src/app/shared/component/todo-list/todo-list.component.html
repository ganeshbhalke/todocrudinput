


<ul class="list-group" *ngIf="getTodos.length >0; else Notodos">
 <li *ngFor="let todo of getTodos" class="list-group-item d-flex justify-content-between  align-items-center">
    <strong>
    {{todo.todoItem}}
    </strong>
    
    <div>
<button
(click)="onEditTodo(todo)"
mat-mini-fab color="primary" class="mr-3">
    <mat-icon>edit</mat-icon>
</button>


 <button 
 (click)="onRemove(todo.todoId)"
 mat-mini-fab  color="warn" class="">
    <mat-icon>delete</mat-icon>
 </button>
    </div>
 </li>
</ul>
<ng-template #Notodos>
<p class="alert alert-success">No Todo Added Yet</p>
</ng-template>
